<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafana TV Zoom Wrapper</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111217;
        }
        
        .grafana-frame {
            /* 100 / 1.15 =~ 87 vw/ 99vh for reshape */
            width: 99vw; 
            height: 99vh;
            
            /* Scale by 1.15x (115%) */
            transform: scale(0.95);
            transform-origin: top left;
            border: none;
        }
    </style>
</head>
<body>
    <iframe 
        class="grafana-frame" 
        src="https://dashboard.arc.vt.edu/d/bebgyh724x14wf/arc-cluster-nodes-cpus-gpus-memory-tv?orgId=1&from=now-24h&to=now&timezone=browser&var-datasource=$__all&refresh=1m&kiosk=true" 
        title="ARC Cluster Dashboard">
    </iframe>
</body>

</html>
